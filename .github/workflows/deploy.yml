name: 部署 Hugo 网站到 GitHub Pages

on:
  push:
    branches: ["main"]  # 如果你的默认分支是 master，改成 master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 下载代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: true  # 如果你的主题是 git submodule，需要这个
          fetch-depth: 0    # 获取完整历史，有些主题需要

      # 2. 安装 Hugo
      - name: 安装 Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'  # 也可以指定版本，比如 '0.120.4'

      # 3. 生成静态文件
      - name: 构建网站
        run: hugo --minify  # --minify 会压缩文件

      # 4. 上传生成的 public 文件夹
      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'  # Hugo 默认输出到 public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4